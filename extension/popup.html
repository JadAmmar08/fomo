<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FOMO</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="shell">
      <div class="brand">
        <div class="mark"></div>
        <div>
          <strong>FOMO</strong>
          <small>Attention network</small>
        </div>
      </div>

      <section class="card">
        <div class="row between">
          <div class="row" style="gap:8px">
            <div id="statusDot" class="status-dot"></div>
            <span id="trackingStatus" style="font-size:0.88rem">Loading…</span>
          </div>
          <label class="switch">
            <input id="trackingToggle" type="checkbox" />
            <span class="slider"></span>
          </label>
        </div>
      </section>

      <section class="card">
        <p class="label">Current page</p>
        <h2 id="topicLabel">Checking…</h2>
        <div id="topicTags" class="tags"></div>
        <p id="reason" class="muted"></p>
      </section>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
